metadata:
  name: blog-service
  namespace: mankahi
spec:
  replicas: 5
  selector:
    matchLabels:
      app: blog-service
  template:
    metadata:
      labels:
        app: blog-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
