          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: blog-service
  namespace: mankahi
  labels:
    app: blog-service
spec:
  type: ClusterIP
  selector:
    app: blog-service
  ports:
  - port: 3002
    targetPort: http
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blog-service-hpa
  namespace: mankahi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blog-service
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 4
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: mankahi
spec:
  replicas: 3
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3003"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: analytics-service
        image: mankahi/analytics-service:1.0.0
        ports:
        - containerPort: 3003
          name: http
          protocol: TCP
        # analytics-service's validateEnvironment hard-requires PORT (the other services default theirs); container-level because services-config is shared and PORT must differ per service
        env:
          - name: PORT
            value: "3003"
          - name: SERVICE_NAME
            value: "analytics-service"
        envFrom:
        - configMapRef:
            name: services-config
        # least-privilege split (Phase 5): only the keys this service consumes
        - secretRef:
            name: secret-shared-core
        resources:
          limits:
            memory: "2Gi"
            cpu: "1500m"
          requests:
            memory: "1Gi"
            cpu: "750m"
            ephemeral-storage: "2Gi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: logs
            mountPath: /app/analytics-service/logs
          - name: tmp
            mountPath: /tmp
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
