apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - storage.yaml
  - config.yaml
  - infrastructure.yaml
  - services.yaml
  - init-job.yaml
  - frontend.yaml
  - ingress.yaml
  - ingress-config.yaml
  - ingress-rbac.yaml
  - monitoring.yaml
  - monitoring-rbac.yaml
  - kube-state-metrics.yaml
  - elasticsearch-exporter.yaml

configMapGenerator:
  - name: grafana-dashboards
    files:
      - dashboards/system-overview.json
      - dashboards/auth-dashboard.json
      - dashboards/blog-dashboard.json
      - dashboards/admin-dashboard.json
      - dashboards/analytics-dashboard.json
  - name: prometheus-config
    files:
      - prometheus/prometheus.yml
      - monitoring-rules.yaml

commonLabels:
  app.kubernetes.io/name: mankahi
  app.kubernetes.io/instance: mankahi
  app.kubernetes.io/part-of: mankahi-blogging-platform

namespace: mankahi
