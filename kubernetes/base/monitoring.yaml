apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mankahi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
              ephemeral-storage: "10Gi"
            limits:
              memory: "1Gi"
              cpu: "500m"
              ephemeral-storage: "12Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: mankahi
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: mankahi
data:
  grafana.ini: |
    [auth.anonymous]
    enabled = true
    org_role = Viewer
    [security]
    admin_user = admin
    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/auth-dashboard.json
    [dashboards.provisioning]
    allow_ui_updates = true
    path = /var/lib/grafana/dashboards
    [security]
    admin_user = admin
    allow_embedding = true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: mankahi
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Man Kahi Dashboards'
        orgId: 1
        folder: 'Services'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
        alerting:
          alertmanager:
            enabled: true
            apiVersion: v2
            implementation: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mankahi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-alerting
              mountPath: /etc/grafana/provisioning/alerting
              readOnly: true
          env:
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
              ephemeral-storage: "5Gi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "6Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: grafana-config
          configMap:
            name: grafana-config
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-provisioning
          configMap:
            name: grafana-provisioning
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        # optional secret = grafana starts before the webhook is sealed; post-seal rollout restart required (startup-only provisioning)
        - name: grafana-alerting
          projected:
            sources:
              - configMap:
                  name: grafana-alerting-provisioning
              - secret:
                  name: grafana-alerting
                  optional: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mankahi
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        uid: prometheus
---
# Bridge rule: any firing Prometheus alert notifies Discord - Phase 6 alerts need zero Grafana churn. Rule model JSON must be validated against a 10.2.0 UI export before acceptance closes (human step).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-provisioning
  namespace: mankahi
data:
  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: mankahi-bridge
        folder: Alerts
        interval: 1m
        rules:
          - uid: mankahi-prometheus-bridge
            title: PrometheusAlertFiring
            condition: C
            for: 0m
            noDataState: OK
            execErrState: Error
            labels:
              severity: critical
            annotations:
              summary: "A Prometheus alert is firing"
              description: "One or more Prometheus alert rules are in the firing state."
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  instant: true
                  editorMode: code
                  expr: ALERTS{alertstate="firing"}
              - refId: B
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: count
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: mankahi
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: mankahi
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: monitoring.mankahi.local
      http:
        paths:
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus-service
                port:
                  number: 9090
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
