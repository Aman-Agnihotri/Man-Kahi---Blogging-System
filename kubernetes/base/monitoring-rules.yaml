# Prometheus alert rules. Loaded via the prometheus-config configMapGenerator
# (kustomization.yaml) at /etc/prometheus/monitoring-rules.yaml; the generator
# hash rolls the prometheus pod on every edit (no live-reload endpoint exists).
# Phase 6 appends ESCircuitBreakerOpen as one more "- alert:" item below.
groups:
  - name: mankahi
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.job }} target {{ $labels.instance }} has been unreachable (up == 0) for more than 5 minutes."
      - alert: PodCrashLooping
        expr: increase(kube_pod_container_status_restarts_total{namespace="mankahi"}[15m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash-looping"
          description: "Container {{ $labels.container }} restarted more than 3 times in 15m."
      - alert: DeploymentReplicasUnavailable
        expr: max_over_time( (kube_deployment_spec_replicas{namespace="mankahi"} - kube_deployment_status_replicas_available{namespace="mankahi"})[5m:] ) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
          description: "A desired replica of {{ $labels.deployment }} was unavailable within the last 5m (pod deleted, crashed, or failing readiness). Sticky 5m window so the 1m Grafana bridge catches short outages."
      # cert-manager pods carry scrape annotations and appeared in Prometheus
      # targets when SD came alive (verified live 2026-07-15, three :9402
      # targets) - this rule was originally a documented follow-up.
      - alert: CertificateExpiringSoon
        expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 14 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Certificate {{ $labels.name }} expires soon"
          description: "cert-manager certificate {{ $labels.namespace }}/{{ $labels.name }} expires in under 14 days."
      - alert: ESCircuitBreakerOpen
        expr: mankahi_es_breaker_state == 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "blog-service Elasticsearch circuit breaker OPEN"
          description: "ES circuit breaker in blog-service OPEN (state==2) >5m; search serving degraded contract. Check elasticsearch pod."
