# One-shot Prisma schema push (prisma migrate deploy / db push, per
# backend/init-service's image CMD). Must complete before backend services
# become healthy, since nothing else creates the Prisma schema in-cluster.
#
# Phase 4 note: once Argo CD manages this app, add
# `argocd.argoproj.io/hook: PreSync` and
# `argocd.argoproj.io/hook-delete-policy: BeforeHookCreation` annotations so
# Argo re-runs this Job on every sync. Pre-Argo, this Job is immutable once
# run to completion — delete the completed Job before re-applying
# (`kubectl delete job mankahi-init-db -n mankahi`).
apiVersion: batch/v1
kind: Job
metadata:
  name: mankahi-init-db
  namespace: mankahi
  annotations:
    # Argo CD lifecycle: run this Job as a PreSync hook on every sync; delete the
    # previous Job object before creating the new one (Jobs are immutable — without
    # this, a re-sync would fail on the fixed-name completed Job).
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: init-service
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-db
          image: mankahi/init-service:1.0.0
          envFrom:
            - configMapRef:
                name: services-config
            # least-privilege split (Phase 5): only the keys this service consumes
            - secretRef:
                name: secret-shared-core
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # seed imports the shared logger which mkdirs cwd/logs at import time; uid 1000 cannot create it in the root-owned image layer (2026-07-15 EACCES repro)
            - name: logs
              mountPath: /app/shared/logs
      volumes:
        - name: logs
          emptyDir: {}
