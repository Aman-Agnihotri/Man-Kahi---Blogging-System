# Anonymous access disabled for internet exposure; admin password from
# grafana-secrets (placeholder until Phase 4 sealing).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mankahi
spec:
  template:
    spec:
      containers:
        - name: grafana
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.REPLACE_ME_DOMAIN"
