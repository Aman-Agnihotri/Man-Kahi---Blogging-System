apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: mankahi
spec:
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
