apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mankahi-ingress
  namespace: mankahi
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: null
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mankahi.work.gd
      secretName: mankahi-tls
  rules:
    - host: mankahi.work.gd
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/blogs
            pathType: Prefix
            backend:
              service:
                name: blog-service
                port:
                  number: 3002
          - path: /api/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3003
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 3004
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
# Monitoring on a dedicated host; Grafana served at root (no subpath config
# needed). rewrite-target nulled out (was a base POC annotation that broke
# every URI). Prometheus path deliberately dropped from internet exposure —
# it has no auth; Grafana reaches it in-cluster via prometheus-service:9090.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: mankahi
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: null
    nginx.ingress.kubernetes.io/rewrite-target: null
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.mankahi.work.gd
      secretName: grafana-tls
  rules:
    - host: grafana.mankahi.work.gd
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
