apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: mankahi
spec:
  template:
    spec:
      containers:
        - name: elasticsearch
          env:
            - name: discovery.type
              value: "single-node"
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: xpack.security.enabled
              value: "false"
