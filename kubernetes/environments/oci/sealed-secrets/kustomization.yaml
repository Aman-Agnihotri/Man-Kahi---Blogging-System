apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Sealed secrets live here - applied by the mankahi-secrets app (wave -1).
# app-secrets.yaml, db-secrets.yaml, and grafana-secrets.yaml are strict-scope,
# name-bound SealedSecrets for namespace `mankahi`; plaintext NEVER lives here.
# See ../../../../docs/gitops.md and ./README.md for the sealing procedure.
# The commented entries below are templates awaiting HUMAN sealing before they
# can be uncommented and applied.
resources:
  - app-secrets.yaml
  - db-secrets.yaml
  - grafana-secrets.yaml
  # - backup-s3-secret.yaml   # uncomment after HUMAN seals backup-s3-secret.yaml.template per docs/gitops.md section 4
  # - secret-shared-core.yaml   # uncomment after HUMAN seals (split step 1 of 3)
  # - secret-auth.yaml          # uncomment after HUMAN seals (split step 1 of 3)
  # - secret-media.yaml         # uncomment after HUMAN seals (split step 1 of 3)