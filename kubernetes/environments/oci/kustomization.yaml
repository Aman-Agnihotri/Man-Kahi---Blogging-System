apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/name: mankahi
  app.kubernetes.io/instance: mankahi
  app.kubernetes.io/part-of: mankahi-blogging-platform

namespace: mankahi

images:
  # auth-service and frontend move together: the OAuth refresh-cookie
  # contract (33a94c2 backend, 6620a45 frontend) is atomic - both must be
  # pinned to the same SHA on every bump.
  - name: mankahi/auth-service
    newName: ghcr.io/aman-agnihotri/mankahi-auth-service
    newTag: e74f1731bcdcb97058878764a5eb97894ac9dbbd
  - name: mankahi/blog-service
    newName: ghcr.io/aman-agnihotri/mankahi-blog-service
    newTag: e74f1731bcdcb97058878764a5eb97894ac9dbbd
  - name: mankahi/analytics-service
    newName: ghcr.io/aman-agnihotri/mankahi-analytics-service
    newTag: e74f1731bcdcb97058878764a5eb97894ac9dbbd
  - name: mankahi/admin-service
    newName: ghcr.io/aman-agnihotri/mankahi-admin-service
    newTag: e74f1731bcdcb97058878764a5eb97894ac9dbbd
  - name: mankahi/init-service
    newName: ghcr.io/aman-agnihotri/mankahi-init-service
    newTag: e74f1731bcdcb97058878764a5eb97894ac9dbbd
  - name: frontend
    newName: ghcr.io/aman-agnihotri/mankahi-frontend
    newTag: e74f1731bcdcb97058878764a5eb97894ac9dbbd

patches:
  - path: app-config.yaml
  - path: patches/resources.yaml
  - path: patches/replicas.yaml
  - path: patches/storageclass.yaml
  - path: patches/elasticsearch.yaml
  - path: patches/ingress-hosts.yaml
  - path: patches/delete-ingress-controller.yaml
  - path: patches/delete-hpa.yaml
  - path: patches/frontend-env.yaml
  - path: patches/grafana-auth.yaml
