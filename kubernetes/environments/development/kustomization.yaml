apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mankahi

resources:
  - ../../base

# Dev secrets: generated from committed .env files with obviously-fake values.
# Names must stay literal (no hash suffix) — base workloads reference them via
# envFrom/secretKeyRef as app-secrets / db-secrets / grafana-secrets.
generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: app-secrets
    type: Opaque
    envs:
      - secrets/app-secrets.env
  - name: db-secrets
    type: Opaque
    envs:
      - secrets/db-secrets.env
  - name: grafana-secrets
    type: Opaque
    envs:
      - secrets/grafana-secrets.env

patchesStrategicMerge:
  []

images:
- name: mankahi/auth-service
  newName: localhost:5000/auth-service
  newTag: dev
- name: mankahi/blog-service
  newName: localhost:5000/blog-service
  newTag: dev
- name: mankahi/analytics-service
  newName: localhost:5000/analytics-service
  newTag: dev
- name: mankahi/admin-service
  newName: localhost:5000/admin-service
  newTag: dev
- name: frontend
  newName: localhost:5000/frontend
  newTag: dev

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: ".*"
  patch: |
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 100m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 128Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 200m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 256Mi
