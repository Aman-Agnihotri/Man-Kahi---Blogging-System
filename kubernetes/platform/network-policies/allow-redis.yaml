# Applied by: mankahi-network-policies (platform child app, wave 1).
# Evidence: Redis: all 4 backends load @shared/config/redis via the shared rate-limit
# middleware (limiter.ts imports redis; every service mounts the limiter); analytics also
# imports it directly (server.ts). init-service has no redis.
# Push order: 2/8.
# Enforcement begins only when default-deny-ingress (8/8) lands; until then this allow is inert.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: mankahi
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - auth-service
                  - blog-service
                  - analytics-service
                  - admin-service
      ports:
        - protocol: TCP
          port: 6379
