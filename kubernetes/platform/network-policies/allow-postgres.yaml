# Applied by: mankahi-network-policies (platform child app, wave 1).
# Evidence: DB clients: prisma consumers auth/blog/analytics/admin (services.yaml envFrom
# DATABASE_URL) + init Job schema push (init-job.yaml, label added in 8ae48ca) + backup
# CronJob pg_dump (postgres-backup-cronjob.yaml, label app: postgres-backup).
# Push order: 1/10.
# Enforcement begins only when default-deny-ingress (10/10) lands; until then this allow is inert.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres
  namespace: mankahi
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - auth-service
                  - blog-service
                  - analytics-service
                  - admin-service
                  - init-service
                  - postgres-backup
      ports:
        - protocol: TCP
          port: 5432
