# Applied by: mankahi-network-policies (platform child app, wave 1).
# Evidence: grafana.mankahi.work.gd served via ingress-nginx (ingress-hosts.yaml grafana
# host + grafana-tls).
# Push order: 5/10.
# Enforcement begins only when default-deny-ingress (10/10) lands; until then this allow is inert.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: mankahi
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
