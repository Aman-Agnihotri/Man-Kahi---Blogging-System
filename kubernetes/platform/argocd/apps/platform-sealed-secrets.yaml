apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"   # platform layer, alongside cert-manager / ingress-nginx
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Aman-Agnihotri/Man-Kahi---Blogging-System.git
    targetRevision: main
    path: kubernetes/platform/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets      # created by this app's own namespace.yaml (kustomize renders it first)
  syncPolicy:
    # LIVE-ADOPTION GATE: MANUAL initially (same rationale as cert-manager / ingress-nginx).
    # Sync by hand, diff the relocation render, verify the controller comes up and mints
    # its key Secret, then uncomment the automated block (spec end-state) and commit.
    # automated:
    #   prune: false     # NEVER prune sealed-secrets. Pruning the CRD cascade-deletes every
    #                    # SealedSecret cluster-wide; and the controller (and, in its namespace,
    #                    # the irreplaceable sealing-key Secret) must never be torn down by an
    #                    # accidental git state. Controller removal is a deliberate manual op.
    #   selfHeal: true
    # No ServerSideApply: the sealed-secrets CRD is small (~150 lines), well under the
    # 256KB last-applied annotation limit — unlike cert-manager, client-side apply is fine.
