apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Aman-Agnihotri/Man-Kahi---Blogging-System.git
    targetRevision: main
    path: kubernetes/platform/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager       # created by the vendored manifest's own Namespace object
  syncPolicy:
    # Live-adoption gate passed 2026-07-13 (manual syncs verified Synced/Healthy); automated end-state active.
    automated:
      prune: false     # binding ruling: never prune cert-manager (CRD safety) — a
                       # pruned CRD deletes every Certificate/ClusterIssuer cluster-wide
      selfHeal: true
    syncOptions:
      - ServerSideApply=true   # cert-manager CRDs are huge; client-side apply overflows
                               # the 256KB last-applied-configuration annotation limit
