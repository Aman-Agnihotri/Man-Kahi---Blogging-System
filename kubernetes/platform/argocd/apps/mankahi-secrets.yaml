apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mankahi-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # after the controller (-2), before the app (0)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Aman-Agnihotri/Man-Kahi---Blogging-System.git
    targetRevision: main
    # Kustomize overlay (kustomization.yaml present); Argo auto-detects it. Renders
    # ZERO resources today (empty resources list) and grows to three SealedSecrets
    # once the human seals app-secrets / db-secrets / grafana-secrets.
    path: kubernetes/environments/oci/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: mankahi
  syncPolicy:
    # AUTOMATED from day one. Reasons:
    #  - There is no live counterpart to adopt (unlike the platform apps), so no
    #    manual live-adoption gate applies. While empty it syncs nothing (no-op).
    #  - Once the human commits the three SealedSecrets, Argo applies them without a
    #    manual step, so wave 0 (mankahi) can proceed off freshly-minted Secrets.
    automated:
      prune: true     # git is the source of truth for the SealedSecret objects. Removing a
                      # SealedSecret from the overlay is a deliberate act; its owned unsealed
                      # Secret is GC'd via ownerReference by the controller — intended GitOps
                      # behavior. (Argo tracks only the SealedSecret CRs, not the controller-
                      # created Secrets, so there is no drift war with the controller.)
      selfHeal: true
    syncOptions:
      # Wave -1 runs before the mankahi app (wave 0, also CreateNamespace=true), so this
      # app may be the first to need the mankahi namespace. While the overlay is empty
      # nothing is created (no namespace yet); it is created on first real SealedSecret.
      - CreateNamespace=true
