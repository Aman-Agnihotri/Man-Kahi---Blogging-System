apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Aman-Agnihotri/Man-Kahi---Blogging-System.git
    targetRevision: main
    # Directory source (auto-detected): Argo reads every *.yaml here as an Application
    # manifest; new files are picked up automatically. recurse defaults to false and is
    # deliberately NOT set: Argo normalizes default values off the live object, and a
    # git-only default field would keep the self-managed root app permanently OutOfSync.
    path: kubernetes/platform/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      # prune:false on the ROOT: never let a transiently-missing file cause Argo to
      # delete a child platform Application and cascade-tear-down live platform infra.
      # Each child manages its own resource pruning. Removing a child app is a
      # deliberate manual `argocd app delete`, not an accidental prune.
      prune: false
