# Merge-patch for argocd-cm. Makes wave -1 (mankahi-secrets) gate on REAL
# SealedSecret reconciliation instead of reporting Healthy the instant the object
# exists — so wave 0 (mankahi) only syncs after decrypted Secrets are present.
data:
  resource.customizations.health.bitnami.com_SealedSecret: |
    hs = {}
    if obj.status ~= nil and obj.status.conditions ~= nil then
      for i, condition in ipairs(obj.status.conditions) do
        if condition.type == "Synced" and condition.status == "True" then
          hs.status = "Healthy"
          hs.message = condition.message
          return hs
        end
        if condition.type == "Synced" and condition.status == "False" then
          hs.status = "Degraded"
          hs.message = condition.message
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for SealedSecret controller to reconcile"
    return hs
